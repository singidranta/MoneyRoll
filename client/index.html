<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07090d" />
    <title>MoneyRoll — Стать богатым</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Rubik:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/hud.css" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #07090d;
        font-family: 'Rubik', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #f5f7fa;
        -webkit-font-smoothing: antialiased;
      }
      #game {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      /* ================= Loading screen ================= */
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background:
          radial-gradient(1000px 500px at 50% -10%, rgba(255, 199, 44, 0.10), transparent 60%),
          radial-gradient(800px 500px at 50% 115%, rgba(58, 224, 111, 0.08), transparent 60%),
          #07090d;
        z-index: 10;
        transition: opacity 0.45s ease;
      }
      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-coin {
        width: 84px;
        height: 84px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 44px;
        background: radial-gradient(circle at 32% 28%, #ffe89a, #ffc72c 45%, #c98f00 100%);
        box-shadow:
          0 0 0 6px rgba(255, 199, 44, 0.12),
          0 0 48px rgba(255, 199, 44, 0.35),
          inset 0 -6px 14px rgba(120, 74, 0, 0.45);
        animation: coinFlip 1.6s ease-in-out infinite;
      }
      @keyframes coinFlip {
        0%   { transform: rotateY(0deg) translateY(0); }
        50%  { transform: rotateY(180deg) translateY(-10px); }
        100% { transform: rotateY(360deg) translateY(0); }
      }
      .loading-title {
        font-family: 'Unbounded', 'Rubik', sans-serif;
        font-weight: 900;
        font-size: 40px;
        letter-spacing: 2px;
        background: linear-gradient(180deg, #fff3c4 0%, #ffc72c 55%, #e09b00 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 12px 40px rgba(255, 199, 44, 0.25);
      }
      .loading-sub {
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #8b93a3;
      }
      .loading-bar {
        width: 240px;
        height: 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .loading-bar::after {
        content: '';
        display: block;
        height: 100%;
        width: 40%;
        border-radius: 999px;
        background: linear-gradient(90deg, #ffc72c, #ffe89a, #ffc72c);
        animation: loadingSlide 1.2s ease-in-out infinite;
      }
      @keyframes loadingSlide {
        0%   { transform: translateX(-120%); }
        100% { transform: translateX(360%); }
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="loading-coin"><img src="/assets/icons/coin.webp" alt="M" style="width:48px;height:48px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));" /></div>
      <div class="loading-title">MONEYROLL</div>
      <div class="loading-sub">от бутылки — до империи</div>
      <div class="loading-bar"></div>
    </div>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
