<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#5a7a42" />
    <title>MoneyRoll — Стать богатым</title>
    <link rel="stylesheet" href="/styles/hud.css" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #5a7a42;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        color: #e8eaed;
        -webkit-font-smoothing: antialiased;
      }
      #game {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      /* Loading — simple, flat */
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #0b0d11; /* loading stays dark; world is grass */
        z-index: 10;
        transition: opacity 0.25s ease;
      }
      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-logo {
        width: 48px;
        height: 48px;
        image-rendering: auto;
      }
      .loading-title {
        font-weight: 800;
        font-size: 28px;
        letter-spacing: 1px;
        color: #e0b03a;
        margin: 0;
      }
      .loading-sub {
        font-size: 13px;
        font-weight: 500;
        color: #8a919e;
        margin: 0;
      }
      .loading-bar-wrap {
        width: 220px;
        height: 10px;
        border: 2px solid #2e3542;
        border-radius: 4px;
        background: #12151a;
        overflow: hidden;
        margin-top: 6px;
      }
      .loading-bar-fill {
        height: 100%;
        width: 0%;
        background: #e0b03a;
        border-radius: 2px;
        transition: width 0.1s linear;
      }
      .loading-pct {
        font-size: 12px;
        font-weight: 600;
        color: #8a919e;
        font-variant-numeric: tabular-nums;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <img class="loading-logo" src="/assets/icons/coin.webp" alt="" width="48" height="48" />
      <div class="loading-title">MoneyRoll</div>
      <div class="loading-sub">загрузка…</div>
      <div class="loading-bar-wrap">
        <div id="loading-bar-fill" class="loading-bar-fill"></div>
      </div>
      <div id="loading-pct" class="loading-pct">0%</div>
    </div>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
